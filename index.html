let page='team', active=P[0].id, charts=[];

// TOP NAV
document.getElementById('topNav').addEventListener('click',e=>{
  const b=e.target.closest('.page-btn'); if(!b) return;
  page=b.dataset.page;
  document.querySelectorAll('.page-btn').forEach(x=>x.classList.toggle('active',x===b));
  document.getElementById('playerNav').style.display=page==='players'?'flex':'none';
  render();
});

function buildNav(){
  const nav=document.getElementById('playerNav'); nav.innerHTML='';
  P.forEach(p=>{
    const b=document.createElement('button');
    b.className='player-btn'+(p.id===active?' active':'');
    b.textContent=p.name;
    b.onclick=()=>{active=p.id;nav.querySelectorAll('.player-btn').forEach((x,i)=>x.classList.toggle('active',P[i].id===active));render();};
    nav.appendChild(b);
  });
}
buildNav();

function render(){
  charts.forEach(c=>c.destroy()); charts=[];
  if(page==='team') renderTeam();
  else if(page==='players') renderPlayer(P.find(x=>x.id===active));
  else renderSummary();
}

function bdg(s){
  if(s==='ÉLITE') return `<span class="badge-e">ÉLITE ✦</span>`;
  if(s==='BAJA') return `<span class="badge-l">BAJA ↓</span>`;
  return `<span class="badge-p">PROM</span>`;
}
function rcls(r){return{si:'r-si',cond:'r-cond',eval:'r-eval',no:'r-no'}[r]||'r-eval';}
function pbar(pct,col){return `<div class="pos-track"><div class="pos-bar" style="width:${pct}%;background:${col};"></div></div>`;}
function efgClr(v){return v>=52?'var(--green)':v>=47?'var(--accent)':'var(--orange)';}

    <div class="kpi" style="border-color:rgba(232,122,74,0.2);"><div class="kpi-val" style="color:var(--orange);">${p.rd.toFixed(1)}</div><div class="kpi-lbl">RD</div></div>

      <div class="kpi-val" style="color:${p.ro>=2?'#e84a7a':'var(--text3)'};">${p.ro.toFixed(1)}</div><div class="kpi-lbl">RO</div>
    </div>
  </div>

  <div class="scorecard-row">
    ${p.sc.map(s=>`<div class="sc-box ${s.bc}"><div class="sc-level ${s.lc}">${s.lv}</div><div class="sc-label">${s.lb}</div><div class="sc-metric">${s.mt}</div><div class="sc-detail">${s.dt}</div></div>`).join('')}
  </div>

  <div class="grid2">
    <div class="scard">
      <div class="scard-title">Posición en el equipo y la liga</div>
      <div class="pos-row"><span class="pos-lbl">PTS</span>${pbar(p.pp[0],'#e8c84a')}<span class="pos-val">${p.pts.toFixed(1)}</span>${bdg(p.pe.pts)}</div>
      <div class="pos-row"><span class="pos-lbl">PLAYS</span>${pbar(p.pp[1],'#4ab8e8')}<span class="pos-val">${p.plays.toFixed(1)}</span>${bdg(p.pe.plays)}</div>
      <div class="pos-row"><span class="pos-lbl">eFG%</span>${pbar(p.pp[2],'#4ae87a')}<span class="pos-val">${p.efg.toFixed(1)}%</span>${bdg(p.pe.efg)}</div>
      <div class="pos-row"><span class="pos-lbl">PPP</span>${pbar(p.pp[3],'#e87a4a')}<span class="pos-val">${p.ppp.toFixed(2)}</span>${bdg(p.pe.ppp)}</div>
      <div style="border-top:1px solid var(--border);margin-top:9px;padding-top:9px;">
        <div class="scard-title" style="margin-bottom:7px;">Rebotes</div>
        <div class="pos-row"><span class="pos-lbl">RD (def)</span>${pbar(Math.min(p.rd/6*100,100),'#e87a4a')}<span class="pos-val">${p.rd.toFixed(1)}</span></div>
        <div class="pos-row"><span class="pos-lbl">RO (of)</span>${pbar(Math.min(p.ro/4.5*100,100),'#e84a7a')}<span class="pos-val">${p.ro.toFixed(1)}</span></div>
      </div>
    </div>
    <div class="scard">
      <div class="scard-title">Local vs Visitante</div>
      <div class="lv-grid">
        <div class="lv-card local">
          <div class="lv-head">Local</div>
          <div class="lv-stat"><span class="lv-lbl">PTS</span><span class="lv-val">${p.lPts.toFixed(1)}</span></div>
          <div class="lv-stat"><span class="lv-lbl">eFG%</span><span class="lv-val">${p.lEfg.toFixed(1)}%</span></div>
          <div class="lv-stat"><span class="lv-lbl">REB</span><span class="lv-val">${p.lReb.toFixed(1)}</span></div>
          <div class="lv-stat"><span class="lv-lbl">VAL</span><span class="lv-val">${p.lVal.toFixed(1)}</span></div>
          <div style="font-size:9px;color:var(--text3);margin-top:5px;font-family:var(--mono);line-height:1.4;">${p.lDesc}</div>
        </div>
        <div class="lv-card visit">
          <div class="lv-head">Visitante</div>
          <div class="lv-stat"><span class="lv-lbl">PTS</span><span class="lv-val">${p.vPts.toFixed(1)}</span></div>
          <div class="lv-stat"><span class="lv-lbl">eFG%</span><span class="lv-val">${p.vEfg.toFixed(1)}%</span></div>
          <div class="lv-stat"><span class="lv-lbl">REB</span><span class="lv-val">${p.vReb.toFixed(1)}</span></div>
          <div class="lv-stat"><span class="lv-lbl">VAL</span><span class="lv-val">${p.vVal.toFixed(1)}</span></div>
          <div style="font-size:9px;color:var(--text3);margin-top:5px;font-family:var(--mono);line-height:1.4;">${p.vDesc}</div>
        </div>
      </div>
    </div>
  </div>

  <div class="scard" style="margin-bottom:12px;">
    <div class="scard-title">Distribución del tiro por zona</div>
    <div class="zona-row" style="padding-bottom:4px;">
      <span class="zona-lbl zona-hdr">Zona</span><span class="zona-lbl zona-hdr">Peso relativo</span>
      <span class="zona-val" style="font-size:9px;color:var(--text3);">CONV%</span>
      <span class="zona-val" style="font-size:9px;color:var(--text3);">PPP</span>
      <span class="zona-val" style="font-size:9px;color:var(--text3);">C / I</span>
    </div>
    <div class="zona-row">
      <span class="zona-lbl" style="color:#4ab8e8;">Triple</span>
      <div class="zona-bwrap"><div class="zona-btrack"><div style="width:${t3p}%;height:4px;background:#4ab8e8;border-radius:3px;"></div></div>
      <span style="font-size:9px;color:var(--text3);font-family:var(--mono);width:28px;">${t3p}%</span></div>
      <span class="zona-val">${p.t3p.toFixed(1)}%</span>
      <span class="zona-val" style="color:${parseFloat(pp3)>=0.95?'var(--green)':parseFloat(pp3)>=0.80?'var(--accent)':'var(--red)'};">${pp3}</span>
      <span class="zona-val">${p.t3c.toFixed(1)}/${p.t3i.toFixed(1)}</span>
    </div>
    <div class="zona-row">
      <span class="zona-lbl" style="color:#e8c84a;">Doble</span>
      <div class="zona-bwrap"><div class="zona-btrack"><div style="width:${t2p}%;height:4px;background:#e8c84a;border-radius:3px;"></div></div>
      <span style="font-size:9px;color:var(--text3);font-family:var(--mono);width:28px;">${t2p}%</span></div>
      <span class="zona-val">${p.t2p.toFixed(1)}%</span>
      <span class="zona-val" style="color:${parseFloat(pp2)>=0.95?'var(--green)':parseFloat(pp2)>=0.80?'var(--accent)':'var(--red)'};">${pp2}</span>
      <span class="zona-val">${p.t2c.toFixed(1)}/${p.t2i.toFixed(1)}</span>
    </div>
    <div class="zona-row">
      <span class="zona-lbl" style="color:#e87a4a;">T. Libre</span>
      <div class="zona-bwrap"><div class="zona-btrack"><div style="width:${t1p}%;height:4px;background:#e87a4a;border-radius:3px;"></div></div>
      <span style="font-size:9px;color:var(--text3);font-family:var(--mono);width:28px;">${t1p}%</span></div>
      <span class="zona-val">${p.t1p.toFixed(1)}%</span>
      <span class="zona-val" style="color:${parseFloat(pp1)>=0.80?'var(--green)':parseFloat(pp1)>=0.65?'var(--accent)':'var(--red)'};">${pp1}</span>
      <span class="zona-val">${p.t1c.toFixed(1)}/${p.t1i.toFixed(1)}</span>
    </div>
  </div>

  <div class="scard" style="margin-bottom:12px;">
    <div class="scard-title">Evolución por bloques (8 × 4 partidos) · PTS · eFG% · VAL</div>
    <div class="block-wrap"><canvas id="bc" role="img" aria-label="Evolución por bloques"></canvas></div>
    <div style="display:flex;gap:14px;margin-top:8px;font-size:9px;color:var(--text3);font-family:var(--mono);">
      <span><span style="display:inline-block;width:12px;height:2px;background:#4ab8e8;vertical-align:middle;margin-right:3px;"></span>PTS</span>
      <span><span style="display:inline-block;width:12px;height:2px;border-top:2px dashed #4ae87a;vertical-align:middle;margin-right:3px;background:none;"></span>eFG%×30</span>
      <span><span style="display:inline-block;width:8px;height:8px;background:rgba(232,200,74,0.2);border:1px solid #e8c84a;vertical-align:middle;margin-right:3px;border-radius:2px;"></span>VAL</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(8,1fr);margin-top:5px;">
      ${['B1\n1-4','B2\n5-8','B3\n9-12','B4\n13-16','B5\n17-20','B6\n21-24','B7\n25-28','B8\n29-32'].map(b=>`<div style="text-align:center;font-size:8px;font-family:var(--mono);color:var(--text3);white-space:pre;">${b}</div>`).join('')}
    </div>
  </div>

  <div class="verdict-row">
    <div class="vcard fav">
      <div class="vtitle g">A favor</div>
      ${p.fav.map(f=>`<div class="vitem">${f}</div>`).join('')}
    </div>
    <div class="vcard con">
      <div class="vtitle a">Condiciones para optimizarlo</div>
      ${p.con.map(c=>`<div class="vitem">${c}</div>`).join('')}
    </div>
  </div>`;

  const ctx=document.getElementById('bc');
  if(!ctx) return;
  const ch=new Chart(ctx,{type:'bar',data:{labels:['B1','B2','B3','B4','B5','B6','B7','B8'],datasets:[
    {type:'bar',label:'VAL',data:p.bl.map(b=>b[2]),backgroundColor:'rgba(232,200,74,0.15)',borderColor:'#e8c84a',borderWidth:1,borderRadius:3,yAxisID:'y'},
    {type:'line',label:'PTS',data:p.bl.map(b=>b[0]),borderColor:'#4ab8e8',backgroundColor:'transparent',borderWidth:2,pointRadius:4,pointBackgroundColor:'#4ab8e8',tension:0.3,yAxisID:'y'},
    {type:'line',label:'eFG%×30',data:p.bl.map(b=>+(b[1]/3).toFixed(2)),borderColor:'#4ae87a',backgroundColor:'transparent',borderWidth:1.5,borderDash:[5,4],pointRadius:3,pointBackgroundColor:'#4ae87a',tension:0.3,yAxisID:'y'}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e2230',titleColor:'#9a9890',bodyColor:'#f0eee8',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
      callbacks:{label:c=>c.dataset.label==='eFG%×30'?'eFG%: '+(c.raw*3).toFixed(1)+'%':c.dataset.label+': '+c.raw}}},
    scales:{x:{ticks:{color:'#5a5856',font:{size:9}},grid:{color:'rgba(255,255,255,0.04)'}},
      y:{min:0,max:20,ticks:{color:'#5a5856',font:{size:9}},grid:{color:'rgba(255,255,255,0.05)'}}}
  }});
  charts.push(ch);
}

// ============================================================
// SUMMARY PAGE
// ============================================================
function renderSummary(){
  const names=P.map(p=>p.name);
  document.getElementById('mainContent').innerHTML=`
  <div style="margin-bottom:24px;">
    <div class="sum-title">Gráficos comparativos del plantel</div>
    <div class="chart-card">
      <div class="chart-card-title">Ranking PTS · Fase regular — todos los jugadores</div>
      <div style="position:relative;height:240px;"><canvas id="c1" role="img" aria-label="Ranking PTS"></canvas></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;">
        ${P.map((p,i)=>`<span style="display:flex;align-items:center;gap:3px;font-family:var(--mono);font-size:9px;color:var(--text3);"><span style="width:7px;height:7px;border-radius:2px;background:${COLORS[i]};display:inline-block;"></span>${p.name}</span>`).join('')}
      </div>
    </div>
    <div class="grid2">
      <div class="chart-card" style="margin-bottom:0;">
        <div class="chart-card-title">eFG% vs Rentabilidad (PPP) · tamaño = PLAYS</div>
        <div style="position:relative;height:230px;"><canvas id="c2" role="img" aria-label="eFG vs PPP"></canvas></div>
      </div>
      <div class="chart-card" style="margin-bottom:0;">
        <div class="chart-card-title">Volumen (PLAYS) vs VAL</div>
        <div style="position:relative;height:230px;"><canvas id="c3" role="img" aria-label="PLAYS vs VAL"></canvas></div>
      </div>
    </div>
  </div>

  <div style="margin-bottom:24px;">
    <div class="sum-title">Perfiles individuales · Fase regular</div>
    <div class="profile-grid">
      ${P.map((p,i)=>`
      <div class="pf-card">
        <div class="pf-header">
          <div class="pf-avatar" style="background:${p.ab};color:${p.ac};">${p.init}</div>
          <div>
            <div class="pf-name">${p.full}</div>
            <div class="pf-sub"><span>${p.pj} PJ · ${p.min.toFixed(1)} MIN</span>
              <span class="${p.pb.includes('ÉLITE')?'badge-e':p.pb.includes('MÍNIMO')||p.pb.includes('INSUFI')?'badge-l':'badge-p'}">${p.pb}</span></div>
          </div>
        </div>
        <div class="pf-stats">
          <div class="pf-stat"><div class="pf-stat-val">${p.pts.toFixed(1)}</div><div class="pf-stat-lbl">PTS</div></div>
          <div class="pf-stat"><div class="pf-stat-val">${p.efg.toFixed(1)}%</div><div class="pf-stat-lbl">eFG%</div></div>
          <div class="pf-stat"><div class="pf-stat-val">${p.ppp.toFixed(2)}</div><div class="pf-stat-lbl">PPP</div></div>
          <div class="pf-stat"><div class="pf-stat-val">${p.plays.toFixed(1)}</div><div class="pf-stat-lbl">PLAYS</div></div>
          <div class="pf-stat"><div class="pf-stat-val">${p.rd.toFixed(1)}</div><div class="pf-stat-lbl">RD</div></div>
          <div class="pf-stat"><div class="pf-stat-val">${p.ro.toFixed(1)}</div><div class="pf-stat-lbl">RO</div></div>
        </div>
        <div class="pf-hl">
          ${p.phl.map(h=>`<div class="pf-hl-item"><span class="pf-hl-lbl">${h.l}</span><span class="pf-hl-val">${h.v}</span></div>`).join('')}
        </div>
        <div class="pf-desc">${p.pd}</div>
      </div>`).join('')}
    </div>
  </div>

  <div>
    <div class="sum-title">Veredictos de renovación · Plantel completo</div>
    ${P.map(p=>`<div class="vl-row"><div class="vl-dot" style="background:${p.rc};margin-top:4px;"></div>
      <div style="flex:1;"><div class="vl-name">${p.full} <span class="renov-badge ${rcls(p.ren)}">${p.rl}</span></div>
      <div class="vl-reason">${p.rr}</div></div></div>`).join('')}
    <div class="exec-box">
      <div class="exec-title">Resumen ejecutivo</div>
      <div class="exec-text">Núcleo irrenunciable: <strong>Stehli + Ibarra + Grytsak + Marini</strong> (los cuatro pilares del sistema). <strong>Roca</strong> merece ascender a rotación de 24+ min en playoffs. <strong>Roveres</strong> aporta con rol definido. <strong>Tarnowyk y Conti</strong> requieren evaluación honesta. <strong>Nesman y Fornes</strong>, prioridad baja — valor de roster.</div>
    </div>
  </div>`;

  const c1=document.getElementById('c1');
  if(c1){
    const ch=new Chart(c1,{type:'bar',data:{labels:names,datasets:[
      {label:'PTS',data:P.map(p=>p.pts),backgroundColor:COLORS.map(c=>c+'44'),borderColor:COLORS,borderWidth:1.5,borderRadius:4},
      {type:'line',label:'MIN/4',data:P.map(p=>+(p.min/4).toFixed(2)),borderColor:'rgba(255,255,255,0.18)',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,4],pointRadius:3,pointBackgroundColor:'rgba(255,255,255,0.25)',tension:0.3}
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e2230',titleColor:'#9a9890',bodyColor:'#f0eee8',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
        callbacks:{label:c=>c.datasetIndex===1?'MIN: '+(c.raw*4).toFixed(1):'PTS: '+c.raw}}},
      scales:{x:{ticks:{color:'#5a5856',font:{size:11}},grid:{display:false}},y:{min:0,max:16,ticks:{color:'#5a5856',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'}}}
    }});
    charts.push(ch);
  }
  const c2=document.getElementById('c2');
  if(c2){
    const ch=new Chart(c2,{type:'scatter',data:{datasets:P.map((p,i)=>({
      label:p.name,data:[{x:p.efg,y:p.ppp}],
      backgroundColor:COLORS[i]+'cc',pointRadius:Math.max(6,p.plays*0.55),borderColor:COLORS[i],borderWidth:1.5
    }))},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e2230',titleColor:'#9a9890',bodyColor:'#f0eee8',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
        callbacks:{label:c=>`${c.dataset.label}: eFG% ${c.parsed.x.toFixed(1)}% | PPP ${c.parsed.y.toFixed(2)}`}}},
      scales:{x:{title:{display:true,text:'eFG%',color:'#5a5856',font:{size:9}},min:35,max:65,ticks:{color:'#5a5856',font:{size:9},callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.05)'}},
        y:{title:{display:true,text:'PPP',color:'#5a5856',font:{size:9}},min:0.55,max:1.20,ticks:{color:'#5a5856',font:{size:9}},grid:{color:'rgba(255,255,255,0.05)'}}}
    }});
    charts.push(ch);
  }
  const c3=document.getElementById('c3');
  if(c3){
    const ch=new Chart(c3,{type:'bar',data:{labels:names,datasets:[
      {label:'VAL',data:P.map(p=>p.val),backgroundColor:COLORS.map(c=>c+'77'),borderColor:COLORS,borderWidth:1.5,borderRadius:4},
      {label:'PLAYS',data:P.map(p=>p.plays),backgroundColor:COLORS.map(c=>c+'22'),borderColor:COLORS.map(c=>c+'55'),borderWidth:1,borderRadius:4}
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e2230',titleColor:'#9a9890',bodyColor:'#f0eee8',borderColor:'rgba(255,255,255,0.1)',borderWidth:1}},
      scales:{x:{ticks:{color:'#5a5856',font:{size:11}},grid:{display:false}},y:{min:0,max:18,ticks:{color:'#5a5856',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'}}}
    }});
    charts.push(ch);
  }
}

render();
</script>
</body>
</html>
