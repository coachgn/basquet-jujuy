<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --accent: #e8c84a;
    --accent2: #4ab8e8;
    --accent3: #e84a7a;
    --text: #f0eee8;
    --text2: #9a9890;
    --text3: #5a5856;
    --green: #4ae87a;
    --orange: #e87a4a;
    --red: #e84a4a;
    --mono: 'DM Mono', monospace;
    --head: 'Barlow Condensed', sans-serif;
    --body: 'Barlow', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border2);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .site-logo {
    font-family: var(--head);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: .02em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .site-logo span { color: var(--text2); font-weight: 400; }
  .site-meta { font-family: var(--mono); font-size: 11px; color: var(--text3); }

  /* NAV DE JUGADORES */
  .player-nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .player-nav::-webkit-scrollbar { display: none; }
  .player-btn {
    font-family: var(--head);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--text3);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 12px 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
  }
  .player-btn:hover { color: var(--text2); }
  .player-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN */
  .main { padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* PLAYER HEADER */
  .player-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .player-avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--head);
    font-size: 20px; font-weight: 800;
    flex-shrink: 0;
    border: 2px solid var(--border2);
  }
  .player-info h1 {
    font-family: var(--head);
    font-size: 32px;
    font-weight: 800;
    letter-spacing: .02em;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1;
  }
  .player-info h1 span { color: var(--accent); }
  .player-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    margin-top: 6px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  /* KPI STRIP */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 12px;
    text-align: center;
  }
  .kpi-val {
    font-family: var(--head);
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .kpi-lbl {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .kpi.accent .kpi-val { color: var(--accent); }
  .kpi.green .kpi-val { color: var(--green); }
  .kpi.blue .kpi-val { color: var(--accent2); }

  /* GRID 2 cols */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }

  /* SECTION CARD */
  .scard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
  }
  .scard-title {
    font-family: var(--head);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .scard-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 12px;
    background: var(--accent);
    border-radius: 2px;
  }

  /* LIGA / EQUIPO BARS */
  .pos-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .pos-lbl { font-family: var(--mono); font-size: 11px; color: var(--text2); width: 80px; flex-shrink: 0; }
  .pos-track { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; }
  .pos-bar { height: 6px; border-radius: 3px; transition: width .4s ease; }
  .pos-val { font-family: var(--mono); font-size: 11px; color: var(--text2); width: 50px; text-align: right; }
  .badge-elite { background: rgba(232,200,74,0.15); color: var(--accent); font-size: 9px; padding: 1px 5px; border-radius: 3px; font-family: var(--mono); border: 1px solid rgba(232,200,74,0.3); }
  .badge-prom { background: rgba(154,152,144,0.1); color: var(--text3); font-size: 9px; padding: 1px 5px; border-radius: 3px; font-family: var(--mono); border: 1px solid rgba(154,152,144,0.15); }
  .badge-low { background: rgba(232,74,74,0.1); color: var(--red); font-size: 9px; padding: 1px 5px; border-radius: 3px; font-family: var(--mono); border: 1px solid rgba(232,74,74,0.2); }

  /* LOCAL VS VISITANTE */
  .lv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .lv-card {
    background: var(--surface2);
    border-radius: 6px;
    padding: 12px;
    border-left: 3px solid var(--border2);
  }
  .lv-card.local { border-left-color: var(--accent2); }
  .lv-card.visit { border-left-color: var(--orange); }
  .lv-head { font-family: var(--head); font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; }
  .lv-stat { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .lv-stat-lbl { color: var(--text3); font-family: var(--mono); font-size: 11px; }
  .lv-stat-val { color: var(--text); font-family: var(--mono); font-size: 11px; font-weight: 500; }

  /* TIRO ZONAS */
  .zona-row {
    display: grid;
    grid-template-columns: 80px 1fr 70px 70px 70px;
    gap: 8px;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .zona-row:last-child { border-bottom: none; }
  .zona-row.header { padding-bottom: 6px; }
  .zona-lbl { font-family: var(--mono); font-size: 11px; color: var(--text2); }
  .zona-lbl.header { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; }
  .zona-bar-wrap { display: flex; align-items: center; gap: 6px; }
  .zona-bar-track { flex: 1; height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; }
  .zona-val { font-family: var(--mono); font-size: 11px; color: var(--text2); text-align: right; }

  /* BLOQUES */
  .block-chart-wrap { position: relative; width: 100%; height: 220px; }

  /* VEREDICTO */
  .verdict-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .verdict-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
  }
  .verdict-card.favor { border-top: 2px solid var(--green); }
  .verdict-card.contra { border-top: 2px solid var(--accent); }
  .verdict-title {
    font-family: var(--head);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .verdict-title.green { color: var(--green); }
  .verdict-title.amber { color: var(--accent); }
  .verdict-item {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
  }
  .verdict-item::before {
    content: '→';
    color: var(--text3);
    flex-shrink: 0;
    font-family: var(--mono);
  }

  /* RENOVACION BADGE */
  .renov-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 4px;
    font-family: var(--head);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-top: 4px;

  .renov-si { background: rgba(74,232,122,0.12); color: var(--green); border: 1px solid rgba(74,232,122,0.25); }
  .renov-cond { background: rgba(74,184,232,0.12); color: var(--accent2); border: 1px solid rgba(74,184,232,0.25); }
  .renov-eval { background: rgba(232,122,74,0.12); color: var(--orange); border: 1px solid rgba(232,122,74,0.25); }
  .renov-no { background: rgba(232,74,74,0.1); color: var(--red); border: 1px solid rgba(232,74,74,0.2); }

  canvas { display: block; }

  @media(max-width: 700px) {
    .kpi-strip { grid-template-columns: repeat(3,1fr); }
    .grid2, .grid3, .verdict-section { grid-template-columns: 1fr; }
    .zona-row { grid-template-columns: 70px 1fr 55px 55px 55px; }
  }
</style>
</head>

const nav = document.getElementById('playerNav');
const main = document.getElementById('mainContent');
let currentCharts = [];
let activeId = PLAYERS[0].id;

function renderNav() {
  PLAYERS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'player-btn' + (p.id === activeId ? ' active' : '');
    btn.textContent = p.name;
    btn.onclick = () => { activeId = p.id; renderAll(); };
    nav.appendChild(btn);
  });
}

function renderAll() {
  // update nav
  nav.querySelectorAll('.player-btn').forEach((btn, i) => {
    btn.classList.toggle('active', PLAYERS[i].id === activeId);
  });
  // destroy old charts
  currentCharts.forEach(c => c.destroy());
  currentCharts = [];
  // find player
  const p = PLAYERS.find(x => x.id === activeId);
  main.innerHTML = buildHTML(p);
  buildCharts(p);
}

function badge(status) {
  if (status === 'ÉLITE') return `<span class="badge-elite">ÉLITE ✦</span>`;
  if (status === 'BAJA') return `<span class="badge-low">BAJA ↓</span>`;
  return `<span class="badge-prom">PROM</span>`;
}

function renovClass(r) {
  if (r === 'si') return 'renov-si';
  if (r === 'cond') return 'renov-cond';
  if (r === 'eval') return 'renov-eval';
  return 'renov-no';
}

function posBar(pct, color) {
  return `<div class="pos-track"><div class="pos-bar" style="width:${pct}%;background:${color};"></div></div>`;
}

function buildCharts(p) {
  const labels = ['B1','B2','B3','B4','B5','B6','B7','B8'];
  const pts = p.bloques.map(b => b[0]);
  const efg = p.bloques.map(b => +(b[1]/3).toFixed(2));
  const val = p.bloques.map(b => b[2]);

  const blockCtx = document.getElementById('blockChart');
  if (!blockCtx) return;

  const chart = new Chart(blockCtx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          type: 'bar',
          label: 'VAL',
          data: val,
          backgroundColor: 'rgba(232,200,74,0.15)',
          borderColor: '#e8c84a',
          borderWidth: 1,
          borderRadius: 3,
          yAxisID: 'y'
        },
        {
          type: 'line',
          label: 'PTS',
          data: pts,
          borderColor: '#4ab8e8',
          backgroundColor: 'transparent',
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: '#4ab8e8',
          tension: 0.3,
          yAxisID: 'y'
        },
        {
          type: 'line',
          label: 'eFG%×30',
          data: efg,
          borderColor: '#4ae87a',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          borderDash: [5,4],
          pointRadius: 3,
          pointBackgroundColor: '#4ae87a',
          tension: 0.3,
          yAxisID: 'y'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e2230',
          titleColor: '#9a9890',
          bodyColor: '#f0eee8',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          callbacks: {
            label: c => {
              if (c.dataset.label === 'eFG%×30') return 'eFG%: ' + (c.raw*3).toFixed(1) + '%';
              return c.dataset.label + ': ' + c.raw;
            }
          }
        }
      },
      scales: {
        x: {
