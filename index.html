document.getElementById('topNav').addEventListener('click',e=>{
  const b=e.target.closest('.page-btn'); if(!b) return;
  page=b.dataset.page;
  document.querySelectorAll('.page-btn').forEach(x=>x.classList.toggle('active',x===b));
  document.getElementById('playerNav').style.display=page==='players'?'flex':'none';
  render();
});

function buildNav(){
  const nav=document.getElementById('playerNav'); nav.innerHTML='';
  P.forEach(p=>{
    const b=document.createElement('button');
    b.className='player-btn'+(p.id===active?' active':'');
    b.textContent=p.name;
    b.onclick=()=>{active=p.id;nav.querySelectorAll('.player-btn').forEach((x,i)=>x.classList.toggle('active',P[i].id===active));render();};
    nav.appendChild(b);
  });
}
buildNav();

function render(){
  charts.forEach(c=>c.destroy()); charts=[];
  if(page==='team') renderTeam();

}

    <div class="chart-card">
      <div class="chart-card-title">Ranking PTS · Fase regular — todos los jugadores</div>
      <div style="position:relative;height:240px;"><canvas id="c1" role="img" aria-label="Ranking PTS"></canvas></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;">
        ${P.map((p,i)=>`<span style="display:flex;align-items:center;gap:3px;font-family:var(--mono);font-size:9px;color:var(--text3);"><span style="width:7px;height:7px;border-radius:2px;background:${COLORS[i]};display:inline-block;"></span>${p.name}</span>`).join('')}
      </div>
    </div>
    <div class="grid2">
      <div class="chart-card" style="margin-bottom:0;">
        <div class="chart-card-title">eFG% vs Rentabilidad (PPP) · tamaño = PLAYS</div>
        <div style="position:relative;height:230px;"><canvas id="c2" role="img" aria-label="eFG vs PPP"></canvas></div>
      </div>
      <div class="chart-card" style="margin-bottom:0;">
        <div class="chart-card-title">Volumen (PLAYS) vs VAL</div>
        <div style="position:relative;height:230px;"><canvas id="c3" role="img" aria-label="PLAYS vs VAL"></canvas></div>
      </div>
    </div>
  </div>

  <div style="margin-bottom:24px;">
    <div class="sum-title">Perfiles individuales · Fase regular</div>
    <div class="profile-grid">
      ${P.map((p,i)=>`
      <div class="pf-card">
        <div class="pf-header">
          <div class="pf-avatar" style="background:${p.ab};color:${p.ac};">${p.init}</div>
          <div>
            <div class="pf-name">${p.full}</div>
            <div class="pf-sub"><span>${p.pj} PJ · ${p.min.toFixed(1)} MIN</span>
              <span class="${p.pb.includes('ÉLITE')?'badge-e':p.pb.includes('MÍNIMO')||p.pb.includes('INSUFI')?'badge-l':'badge-p'}">${p.pb}</span></div>
          </div>
        </div>
        <div class="pf-stats">
          <div class="pf-stat"><div class="pf-stat-val">${p.pts.toFixed(1)}</div><div class="pf-stat-lbl">PTS</div></div>
          <div class="pf-stat"><div class="pf-stat-val">${p.efg.toFixed(1)}%</div><div class="pf-stat-lbl">eFG%</div></div>
          <div class="pf-stat"><div class="pf-stat-val">${p.ppp.toFixed(2)}</div><div class="pf-stat-lbl">PPP</div></div>
          <div class="pf-stat"><div class="pf-stat-val">${p.plays.toFixed(1)}</div><div class="pf-stat-lbl">PLAYS</div></div>
          <div class="pf-stat"><div class="pf-stat-val">${p.rd.toFixed(1)}</div><div class="pf-stat-lbl">RD</div></div>
          <div class="pf-stat"><div class="pf-stat-val">${p.ro.toFixed(1)}</div><div class="pf-stat-lbl">RO</div></div>
        </div>
        <div class="pf-hl">
          ${p.phl.map(h=>`<div class="pf-hl-item"><span class="pf-hl-lbl">${h.l}</span><span class="pf-hl-val">${h.v}</span></div>`).join('')}
        </div>
        <div class="pf-desc">${p.pd}</div>
      </div>`).join('')}
    </div>
  </div>

  <div>
    <div class="sum-title">Veredictos de renovación · Plantel completo</div>
    ${P.map(p=>`<div class="vl-row"><div class="vl-dot" style="background:${p.rc};margin-top:4px;"></div>
      <div style="flex:1;"><div class="vl-name">${p.full} <span class="renov-badge ${rcls(p.ren)}">${p.rl}</span></div>
      <div class="vl-reason">${p.rr}</div></div></div>`).join('')}
    <div class="exec-box">
      <div class="exec-title">Resumen ejecutivo</div>
      <div class="exec-text">Núcleo irrenunciable: <strong>Stehli + Ibarra + Grytsak + Marini</strong> (los cuatro pilares del sistema). <strong>Roca</strong> merece ascender a rotación de 24+ min en playoffs. <strong>Roveres</strong> aporta con rol definido. <strong>Tarnowyk y Conti</strong> requieren evaluación honesta. <strong>Nesman y Fornes</strong>, prioridad baja — valor de roster.</div>
    </div>
  </div>`;

  const c1=document.getElementById('c1');
  if(c1){
    const ch=new Chart(c1,{type:'bar',data:{labels:names,datasets:[
      {label:'PTS',data:P.map(p=>p.pts),backgroundColor:COLORS.map(c=>c+'44'),borderColor:COLORS,borderWidth:1.5,borderRadius:4},
      {type:'line',label:'MIN/4',data:P.map(p=>+(p.min/4).toFixed(2)),borderColor:'rgba(255,255,255,0.18)',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,4],pointRadius:3,pointBackgroundColor:'rgba(255,255,255,0.25)',tension:0.3}
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e2230',titleColor:'#9a9890',bodyColor:'#f0eee8',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
        callbacks:{label:c=>c.datasetIndex===1?'MIN: '+(c.raw*4).toFixed(1):'PTS: '+c.raw}}},
      scales:{x:{ticks:{color:'#5a5856',font:{size:11}},grid:{display:false}},y:{min:0,max:16,ticks:{color:'#5a5856',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'}}}
    }});
    charts.push(ch);
  }
  const c2=document.getElementById('c2');
  if(c2){
    const ch=new Chart(c2,{type:'scatter',data:{datasets:P.map((p,i)=>({
      label:p.name,data:[{x:p.efg,y:p.ppp}],
      backgroundColor:COLORS[i]+'cc',pointRadius:Math.max(6,p.plays*0.55),borderColor:COLORS[i],borderWidth:1.5
    }))},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e2230',titleColor:'#9a9890',bodyColor:'#f0eee8',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
        callbacks:{label:c=>`${c.dataset.label}: eFG% ${c.parsed.x.toFixed(1)}% | PPP ${c.parsed.y.toFixed(2)}`}}},
      scales:{x:{title:{display:true,text:'eFG%',color:'#5a5856',font:{size:9}},min:35,max:65,ticks:{color:'#5a5856',font:{size:9},callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.05)'}},
        y:{title:{display:true,text:'PPP',color:'#5a5856',font:{size:9}},min:0.55,max:1.20,ticks:{color:'#5a5856',font:{size:9}},grid:{color:'rgba(255,255,255,0.05)'}}}
    }});
    charts.push(ch);
  }
  const c3=document.getElementById('c3');
  if(c3){
    const ch=new Chart(c3,{type:'bar',data:{labels:names,datasets:[
      {label:'VAL',data:P.map(p=>p.val),backgroundColor:COLORS.map(c=>c+'77'),borderColor:COLORS,borderWidth:1.5,borderRadius:4},
      {label:'PLAYS',data:P.map(p=>p.plays),backgroundColor:COLORS.map(c=>c+'22'),borderColor:COLORS.map(c=>c+'55'),borderWidth:1,borderRadius:4}
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e2230',titleColor:'#9a9890',bodyColor:'#f0eee8',borderColor:'rgba(255,255,255,0.1)',borderWidth:1}},
      scales:{x:{ticks:{color:'#5a5856',font:{size:11}},grid:{display:false}},y:{min:0,max:18,ticks:{color:'#5a5856',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'}}}
    }});
    charts.push(ch);
  }
}

render();
</script>
</body>
</html>
