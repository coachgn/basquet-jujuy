<title>Jujuy Básquet · Análisis de Plantel 2025-26</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0f14;--surface:#161920;--surface2:#1e2230;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
    --accent:#e8c84a;--accent2:#4ab8e8;
    --text:#f0eee8;--text2:#9a9890;--text3:#5a5856;
    --green:#4ae87a;--orange:#e87a4a;--red:#e84a4a;
    --mono:'DM Mono',monospace;--head:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:14px;line-height:1.5;min-height:100vh}
  .site-header{background:var(--surface);border-bottom:1px solid var(--border2);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .site-logo{font-family:var(--head);font-size:22px;font-weight:800;letter-spacing:.02em;color:var(--accent);text-transform:uppercase}
  .site-logo span{color:var(--text2);font-weight:400}
  .site-meta{font-family:var(--mono);font-size:11px;color:var(--text3)}
  .top-nav{background:var(--surface);border-bottom:1px solid var(--border2);padding:0 24px;display:flex;overflow-x:auto;scrollbar-width:none}
  .top-nav::-webkit-scrollbar{display:none}
  .page-btn{font-family:var(--head);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;padding:10px 18px;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s}
  .page-btn:hover{color:var(--text2)}
  .page-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
  .player-nav{background:var(--surface2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
  .player-nav::-webkit-scrollbar{display:none}
  .player-btn{font-family:var(--head);font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;padding:9px 11px;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s}
  .player-btn:hover{color:var(--text2)}
  .player-btn.active{color:var(--accent2);border-bottom-color:var(--accent2)}
  .main{padding:20px 24px;max-width:1200px;margin:0 auto}
  /* player header */
  .player-header{display:flex;align-items:flex-start;gap:18px;margin-bottom:18px;padding-bottom:18px;border-bottom:1px solid var(--border)}
  .player-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-size:17px;font-weight:800;flex-shrink:0;border:2px solid var(--border2)}
  .player-info h1{font-family:var(--head);font-size:28px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;line-height:1}
  .player-info h1 span{color:var(--accent)}
  .player-meta{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:5px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  /* kpi */
  .kpi-strip{display:grid;grid-template-columns:repeat(8,1fr);gap:7px;margin-bottom:14px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:11px 8px;text-align:center}
  .kpi-val{font-family:var(--head);font-size:20px;font-weight:700;color:var(--text);line-height:1}
  .kpi-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
  /* scorecard */
  .scorecard-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
  .sc-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 13px;position:relative;overflow:hidden}
  .sc-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:8px 8px 0 0}
  .sc-box.c-green::before{background:var(--green)}
  .sc-box.c-blue::before{background:var(--accent2)}
  .sc-box.c-amber::before{background:var(--accent)}
  .sc-box.c-orange::before{background:var(--orange)}
  .sc-box.c-red::before{background:var(--red)}
  .sc-level{font-family:var(--head);font-size:20px;font-weight:800;line-height:1;margin-bottom:1px}
  .sc-level.green{color:var(--green)}.sc-level.blue{color:var(--accent2)}.sc-level.amber{color:var(--accent)}.sc-level.orange{color:var(--orange)}.sc-level.red{color:var(--red)}
  .sc-label{font-family:var(--head);font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text2);margin-bottom:4px}
  .sc-metric{font-family:var(--mono);font-size:11px;color:var(--text3);margin-bottom:5px}
  .sc-detail{font-family:var(--mono);font-size:10px;color:var(--text3);line-height:1.45;border-top:1px solid var(--border);padding-top:5px;margin-top:2px}
  /* grids */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  /* section card */
  .scard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:15px}
  .scard-title{font-family:var(--head);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:11px;display:flex;align-items:center;gap:6px}
  .scard-title::before{content:'';display:inline-block;width:3px;height:10px;background:var(--accent);border-radius:2px}
  /* pos bars */
  .pos-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .pos-lbl{font-family:var(--mono);font-size:11px;color:var(--text2);width:70px;flex-shrink:0}
  .pos-track{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px}
  .pos-bar{height:5px;border-radius:3px}
  .pos-val{font-family:var(--mono);font-size:11px;color:var(--text2);width:44px;text-align:right}
  .badge-e{background:rgba(232,200,74,0.15);color:var(--accent);font-size:9px;padding:1px 5px;border-radius:3px;font-family:var(--mono);border:1px solid rgba(232,200,74,0.3)}
  .badge-p{background:rgba(154,152,144,0.1);color:var(--text3);font-size:9px;padding:1px 5px;border-radius:3px;font-family:var(--mono);border:1px solid rgba(154,152,144,0.15)}
  .badge-l{background:rgba(232,74,74,0.1);color:var(--red);font-size:9px;padding:1px 5px;border-radius:3px;font-family:var(--mono);border:1px solid rgba(232,74,74,0.2)}
  /* lv */
  .lv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .lv-card{background:var(--surface2);border-radius:6px;padding:11px;border-left:3px solid var(--border2)}
  .lv-card.local{border-left-color:var(--accent2)}.lv-card.visit{border-left-color:var(--orange)}
  .lv-head{font-family:var(--head);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);margin-bottom:7px}
  .lv-stat{display:flex;justify-content:space-between;margin-bottom:3px}
  .lv-lbl{color:var(--text3);font-family:var(--mono);font-size:10px}
  .lv-val{color:var(--text);font-family:var(--mono);font-size:10px;font-weight:500}
  /* zona */
  .zona-row{display:grid;grid-template-columns:68px 1fr 60px 52px 58px;gap:5px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
  .zona-row:last-child{border-bottom:none}
  .zona-lbl{font-family:var(--mono);font-size:11px;color:var(--text2)}
  .zona-hdr{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
  .zona-bwrap{display:flex;align-items:center;gap:5px}
  .zona-btrack{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:3px}
  .zona-val{font-family:var(--mono);font-size:11px;color:var(--text2);text-align:right}
  /* blocks */
  .block-wrap{position:relative;width:100%;height:200px}
  /* verdict */
  .verdict-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:0}
  .vcard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:15px}
  .vcard.fav{border-top:2px solid var(--green)}.vcard.con{border-top:2px solid var(--accent)}
  .vtitle{font-family:var(--head);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px}
  .vtitle.g{color:var(--green)}.vtitle.a{color:var(--accent)}
  .vitem{display:flex;gap:6px;margin-bottom:6px;font-size:11px;color:var(--text2);line-height:1.5}
  .vitem::before{content:'→';color:var(--text3);flex-shrink:0;font-family:var(--mono)}
  /* renov badge */
  .renov-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:4px;font-family:var(--head);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}

  .r-cond{background:rgba(74,184,232,0.12);color:var(--accent2);border:1px solid rgba(74,184,232,0.25)}
  .r-eval{background:rgba(232,122,74,0.12);color:var(--orange);border:1px solid rgba(232,122,74,0.25)}

  .sum-title{font-family:var(--head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:7px}
  .sum-title::before{content:'';display:inline-block;width:3px;height:11px;background:var(--accent);border-radius:2px}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
  .chart-card-title{font-family:var(--head);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:6px}
  .chart-card-title::before{content:'';display:inline-block;width:3px;height:10px;background:var(--accent2);border-radius:2px}
  .profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .pf-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px}
  .pf-header{display:flex;align-items:center;gap:9px;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid var(--border)}
  .pf-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-size:11px;font-weight:800;flex-shrink:0;border:1px solid var(--border2)}
  .pf-name{font-size:12px;font-weight:500;color:var(--text);font-family:var(--head);letter-spacing:.02em;text-transform:uppercase}
  .pf-sub{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .pf-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:7px}
  .pf-stat{text-align:center;background:var(--surface2);border-radius:4px;padding:5px 3px}
  .pf-stat-val{font-family:var(--head);font-size:14px;font-weight:700;color:var(--text);line-height:1}
  .pf-stat-lbl{font-family:var(--mono);font-size:8px;color:var(--text3);margin-top:1px;text-transform:uppercase}
  .pf-hl{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:7px}
  .pf-hl-item{background:var(--surface2);border-radius:4px;padding:6px 7px;display:flex;justify-content:space-between;align-items:center}
  .pf-hl-lbl{font-family:var(--mono);font-size:9px;color:var(--text3)}
  .pf-hl-val{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text2)}
  .pf-desc{font-size:10px;color:var(--text3);line-height:1.5;font-family:var(--mono)}
  .vl-row{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:7px}
  .vl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
  .vl-name{font-family:var(--head);font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .vl-reason{font-size:10px;color:var(--text3);line-height:1.5;font-family:var(--mono)}
  .exec-box{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:16px;border-left:3px solid var(--accent);margin-top:12px}
  .exec-title{font-family:var(--head);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:7px}
  .exec-text{font-size:11px;color:var(--text2);line-height:1.7;font-family:var(--mono)}
  .exec-text strong{color:var(--text)}
  canvas{display:block}
  @media(max-width:700px){
    .kpi-strip{grid-template-columns:repeat(4,1fr)}
    .grid2,.scorecard-row,.verdict-row,.profile-grid{grid-template-columns:1fr}
    .zona-row{grid-template-columns:62px 1fr 54px 46px 52px}
  }
</style>
</head>

const COLORS=['#4ab8e8','#4ae87a','#e87a4a','#c87aaa','#e8c84a','#7a7ae8','#4ae87a','#9a9890','#e84a4a'];
let page='players', active=P[0].id, charts=[];

// TOP NAV
document.getElementById('topNav').addEventListener('click',e=>{
  const b=e.target.closest('.page-btn'); if(!b) return;
  page=b.dataset.page;
  document.querySelectorAll('.page-btn').forEach(x=>x.classList.toggle('active',x===b));
  document.getElementById('playerNav').style.display=page==='players'?'flex':'none';
  render();
});

// PLAYER NAV
function buildNav(){
  const nav=document.getElementById('playerNav'); nav.innerHTML='';
  P.forEach(p=>{
    const b=document.createElement('button');
    b.className='player-btn'+(p.id===active?' active':'');
    b.textContent=p.name;
    b.onclick=()=>{active=p.id;nav.querySelectorAll('.player-btn').forEach((x,i)=>x.classList.toggle('active',P[i].id===active));render();};
    nav.appendChild(b);
  });
}
buildNav();

function render(){
  charts.forEach(c=>c.destroy()); charts=[];
  if(page==='players') renderPlayer(P.find(x=>x.id===active));
  else renderSummary();
}

// HELPERS
function bdg(s){
  if(s==='ÉLITE') return `<span class="badge-e">ÉLITE ✦</span>`;
  if(s==='BAJA') return `<span class="badge-l">BAJA ↓</span>`;
  return `<span class="badge-p">PROM</span>`;
}
function rcls(r){return{si:'r-si',cond:'r-cond',eval:'r-eval',no:'r-no'}[r];}
function pbar(pct,col){return `<div class="pos-track"><div class="pos-bar" style="width:${pct}%;background:${col};"></div></div>`;}
function efgClr(v){return v>=52?'var(--green)':v>=47?'var(--accent)':'var(--orange)';}
function pppClr(v){return v>=1.0?'var(--green)':v>=0.85?'var(--accent)':'var(--red)';}

// PLAYER PAGE
function renderPlayer(p){
  const tot=p.t2i+p.t3i+p.t1i;
  const t2p=tot>0?(p.t2i/tot*100).toFixed(1):0;
  const t3p=tot>0?(p.t3i/tot*100).toFixed(1):0;
  const t1p=tot>0?(p.t1i/tot*100).toFixed(1):0;
  const pp2=(p.t2p/100*2).toFixed(2);
  const pp3=(p.t3p/100*3).toFixed(2);
  const pp1=(p.t1p/100).toFixed(2);

  document.getElementById('mainContent').innerHTML=`
  <div class="player-header">
    <div class="player-avatar" style="background:${p.ab};color:${p.ac};">${p.init}</div>
    <div class="player-info">
      <h1>${p.name}</h1>
      <div class="player-meta">
        <span>JUJUY BÁSQUET · ${p.pj} PJ · FASE REGULAR</span>
        <span class="renov-badge ${rcls(p.ren)}">${p.rl}</span>
      </div>
    </div>
  </div>

  <div class="kpi-strip">
    <div class="kpi"><div class="kpi-val">${p.min.toFixed(1)}</div><div class="kpi-lbl">MIN</div></div>
    <div class="kpi" style="border-color:rgba(232,200,74,0.2);"><div class="kpi-val" style="color:var(--accent);">${p.pts.toFixed(1)}</div><div class="kpi-lbl">PTS</div></div>
    <div class="kpi" style="border-color:rgba(74,184,232,0.2);"><div class="kpi-val" style="color:var(--accent2);">${p.plays.toFixed(1)}</div><div class="kpi-lbl">PLAYS</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--text3);">${p.usg.toFixed(1)}%</div><div class="kpi-lbl">USG%</div></div>
    <div class="kpi" style="border-color:${p.efg>=52?'rgba(74,232,122,0.2)':p.efg>=47?'rgba(232,200,74,0.2)':'rgba(232,122,74,0.2)'};">
      <div class="kpi-val" style="color:${efgClr(p.efg)};">${p.efg.toFixed(1)}%</div><div class="kpi-lbl">eFG%</div>
    </div>
    <div class="kpi" style="border-color:rgba(74,232,122,0.2);"><div class="kpi-val" style="color:var(--green);">${p.val.toFixed(1)}</div><div class="kpi-lbl">VAL</div></div>
    <div class="kpi" style="border-color:rgba(232,122,74,0.2);"><div class="kpi-val" style="color:var(--orange);">${p.rd.toFixed(1)}</div><div class="kpi-lbl">RD</div></div>
    <div class="kpi" style="border-color:${p.ro>=2?'rgba(232,74,122,0.2)':'rgba(255,255,255,0.07)'};">
      <div class="kpi-val" style="color:${p.ro>=2?'#e84a7a':'var(--text3)'};">${p.ro.toFixed(1)}</div><div class="kpi-lbl">RO</div>
    </div>
  </div>

  <div class="scorecard-row">
    ${p.sc.map(s=>`
    <div class="sc-box ${s.bc}">
      <div class="sc-level ${s.lc}">${s.lv}</div>
      <div class="sc-label">${s.lb}</div>
      <div class="sc-metric">${s.mt}</div>
      <div class="sc-detail">${s.dt}</div>
    </div>`).join('')}
  </div>

  <div class="grid2">
    <div class="scard">
      <div class="scard-title">Posición en el equipo y la liga</div>
      <div class="pos-row"><span class="pos-lbl">PTS</span>${pbar(p.pp[0],'#e8c84a')}<span class="pos-val">${p.pts.toFixed(1)}</span>${bdg(p.pe.pts)}</div>
      <div class="pos-row"><span class="pos-lbl">PLAYS</span>${pbar(p.pp[1],'#4ab8e8')}<span class="pos-val">${p.plays.toFixed(1)}</span>${bdg(p.pe.plays)}</div>
      <div class="pos-row"><span class="pos-lbl">eFG%</span>${pbar(p.pp[2],'#4ae87a')}<span class="pos-val">${p.efg.toFixed(1)}%</span>${bdg(p.pe.efg)}</div>
      <div class="pos-row"><span class="pos-lbl">PPP</span>${pbar(p.pp[3],'#e87a4a')}<span class="pos-val">${p.ppp.toFixed(2)}</span>${bdg(p.pe.ppp)}</div>
      <div style="border-top:1px solid var(--border);margin-top:9px;padding-top:9px;">
        <div class="scard-title" style="margin-bottom:7px;">Rebotes</div>
        <div class="pos-row">
          <span class="pos-lbl">RD (def)</span>${pbar(Math.min(p.rd/6*100,100),'#e87a4a')}<span class="pos-val">${p.rd.toFixed(1)}</span>
        </div>
        <div class="pos-row">
          <span class="pos-lbl">RO (of)</span>${pbar(Math.min(p.ro/4.5*100,100),'#e84a7a')}<span class="pos-val">${p.ro.toFixed(1)}</span>
        </div>
      </div>
    </div>
    <div class="scard">
      <div class="scard-title">Local vs Visitante</div>
      <div class="lv-grid">
        <div class="lv-card local">
          <div class="lv-head">Local</div>
          <div class="lv-stat"><span class="lv-lbl">PTS</span><span class="lv-val">${p.lPts.toFixed(1)}</span></div>
          <div class="lv-stat"><span class="lv-lbl">eFG%</span><span class="lv-val">${p.lEfg.toFixed(1)}%</span></div>
          <div class="lv-stat"><span class="lv-lbl">REB</span><span class="lv-val">${p.lReb.toFixed(1)}</span></div>
          <div class="lv-stat"><span class="lv-lbl">VAL</span><span class="lv-val">${p.lVal.toFixed(1)}</span></div>
          <div style="font-size:9px;color:var(--text3);margin-top:5px;font-family:var(--mono);line-height:1.4;">${p.lDesc}</div>
        </div>
        <div class="lv-card visit">
          <div class="lv-head">Visitante</div>
          <div class="lv-stat"><span class="lv-lbl">PTS</span><span class="lv-val">${p.vPts.toFixed(1)}</span></div>
          <div class="lv-stat"><span class="lv-lbl">eFG%</span><span class="lv-val">${p.vEfg.toFixed(1)}%</span></div>
          <div class="lv-stat"><span class="lv-lbl">REB</span><span class="lv-val">${p.vReb.toFixed(1)}</span></div>
          <div class="lv-stat"><span class="lv-lbl">VAL</span><span class="lv-val">${p.vVal.toFixed(1)}</span></div>
          <div style="font-size:9px;color:var(--text3);margin-top:5px;font-family:var(--mono);line-height:1.4;">${p.vDesc}</div>
        </div>
      </div>
    </div>
  </div>

  <div class="scard" style="margin-bottom:12px;">
    <div class="scard-title">Distribución del tiro por zona</div>
    <div class="zona-row" style="padding-bottom:4px;">
      <span class="zona-lbl zona-hdr">Zona</span><span class="zona-lbl zona-hdr">Peso relativo</span>
      <span class="zona-val" style="font-size:9px;color:var(--text3);">CONV%</span>
      <span class="zona-val" style="font-size:9px;color:var(--text3);">PPP</span>
      <span class="zona-val" style="font-size:9px;color:var(--text3);">C / I</span>
    </div>
    <div class="zona-row">
      <span class="zona-lbl" style="color:#4ab8e8;">Triple</span>
      <div class="zona-bwrap"><div class="zona-btrack"><div style="width:${t3p}%;height:4px;background:#4ab8e8;border-radius:3px;"></div></div>
      <span style="font-size:9px;color:var(--text3);font-family:var(--mono);width:28px;">${t3p}%</span></div>
      <span class="zona-val">${p.t3p.toFixed(1)}%</span>
      <span class="zona-val" style="color:${parseFloat(pp3)>=0.95?'var(--green)':parseFloat(pp3)>=0.80?'var(--accent)':'var(--red)'};">${pp3}</span>
      <span class="zona-val">${p.t3c.toFixed(1)}/${p.t3i.toFixed(1)}</span>
    </div>
    <div class="zona-row">
      <span class="zona-lbl" style="color:#e8c84a;">Doble</span>
      <div class="zona-bwrap"><div class="zona-btrack"><div style="width:${t2p}%;height:4px;background:#e8c84a;border-radius:3px;"></div></div>
      <span style="font-size:9px;color:var(--text3);font-family:var(--mono);width:28px;">${t2p}%</span></div>
      <span class="zona-val">${p.t2p.toFixed(1)}%</span>
      <span class="zona-val" style="color:${parseFloat(pp2)>=0.95?'var(--green)':parseFloat(pp2)>=0.80?'var(--accent)':'var(--red)'};">${pp2}</span>
      <span class="zona-val">${p.t2c.toFixed(1)}/${p.t2i.toFixed(1)}</span>
    </div>
    <div class="zona-row">
      <span class="zona-lbl" style="color:#e87a4a;">T. Libre</span>
      <div class="zona-bwrap"><div class="zona-btrack"><div style="width:${t1p}%;height:4px;background:#e87a4a;border-radius:3px;"></div></div>
      <span style="font-size:9px;color:var(--text3);font-family:var(--mono);width:28px;">${t1p}%</span></div>
      <span class="zona-val">${p.t1p.toFixed(1)}%</span>
      <span class="zona-val" style="color:${parseFloat(pp1)>=0.80?'var(--green)':parseFloat(pp1)>=0.65?'var(--accent)':'var(--red)'};">${pp1}</span>
      <span class="zona-val">${p.t1c.toFixed(1)}/${p.t1i.toFixed(1)}</span>
    </div>
  </div>

  <div class="scard" style="margin-bottom:12px;">
    <div class="scard-title">Evolución por bloques (8 × 4 partidos) · PTS · eFG% · VAL</div>
    <div class="block-wrap"><canvas id="bc" role="img" aria-label="Evolución por bloques"></canvas></div>
    <div style="display:flex;gap:14px;margin-top:8px;font-size:9px;color:var(--text3);font-family:var(--mono);">
      <span><span style="display:inline-block;width:12px;height:2px;background:#4ab8e8;vertical-align:middle;margin-right:3px;"></span>PTS</span>
      <span><span style="display:inline-block;width:12px;height:2px;border-top:2px dashed #4ae87a;vertical-align:middle;margin-right:3px;background:none;"></span>eFG%×30</span>
      <span><span style="display:inline-block;width:8px;height:8px;background:rgba(232,200,74,0.2);border:1px solid #e8c84a;vertical-align:middle;margin-right:3px;border-radius:2px;"></span>VAL</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(8,1fr);margin-top:5px;">
      ${['B1\n1-4','B2\n5-8','B3\n9-12','B4\n13-16','B5\n17-20','B6\n21-24','B7\n25-28','B8\n29-32'].map(b=>`<div style="text-align:center;font-size:8px;font-family:var(--mono);color:var(--text3);white-space:pre;">${b}</div>`).join('')}
    </div>
  </div>

  <div class="verdict-row">
    <div class="vcard fav">
      <div class="vtitle g">A favor</div>
      ${p.fav.map(f=>`<div class="vitem">${f}</div>`).join('')}
    </div>
    <div class="vcard con">
      <div class="vtitle a">Condiciones para optimizarlo</div>
      ${p.con.map(c=>`<div class="vitem">${c}</div>`).join('')}
    </div>
  </div>`;

  const ctx=document.getElementById('bc');
  if(!ctx) return;
  const ch=new Chart(ctx,{
    type:'bar',
    data:{labels:['B1','B2','B3','B4','B5','B6','B7','B8'],datasets:[
      {type:'bar',label:'VAL',data:p.bl.map(b=>b[2]),backgroundColor:'rgba(232,200,74,0.15)',borderColor:'#e8c84a',borderWidth:1,borderRadius:3,yAxisID:'y'},
      {type:'line',label:'PTS',data:p.bl.map(b=>b[0]),borderColor:'#4ab8e8',backgroundColor:'transparent',borderWidth:2,pointRadius:4,pointBackgroundColor:'#4ab8e8',tension:0.3,yAxisID:'y'},
      {type:'line',label:'eFG%×30',data:p.bl.map(b=>+(b[1]/3).toFixed(2)),borderColor:'#4ae87a',backgroundColor:'transparent',borderWidth:1.5,borderDash:[5,4],pointRadius:3,pointBackgroundColor:'#4ae87a',tension:0.3,yAxisID:'y'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e2230',titleColor:'#9a9890',bodyColor:'#f0eee8',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
        callbacks:{label:c=>c.dataset.label==='eFG%×30'?'eFG%: '+(c.raw*3).toFixed(1)+'%':c.dataset.label+': '+c.raw}}},
      scales:{
        x:{ticks:{color:'#5a5856',font:{size:9,family:"'DM Mono',monospace"}},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{min:0,max:20,ticks:{color:'#5a5856',font:{size:9}},grid:{color:'rgba(255,255,255,0.05)'}}
      }
    }
  });
  charts.push(ch);
}

// SUMMARY PAGE
function renderSummary(){
  const names=P.map(p=>p.name);
  document.getElementById('mainContent').innerHTML=`
  <div style="margin-bottom:24px;">
    <div class="sum-title">Gráficos comparativos del plantel</div>
    <div class="chart-card">
      <div class="chart-card-title">Ranking PTS · Fase regular — todos los jugadores</div>
      <div style="position:relative;height:260px;"><canvas id="c1" role="img" aria-label="Ranking PTS todos los jugadores"></canvas></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;">
        ${P.map((p,i)=>`<span style="display:flex;align-items:center;gap:3px;font-family:var(--mono);font-size:9px;color:var(--text3);"><span style="width:7px;height:7px;border-radius:2px;background:${COLORS[i]};display:inline-block;"></span>${p.name}</span>`).join('')}
      </div>
    </div>
    <div class="grid2">
      <div class="chart-card" style="margin-bottom:0;">
        <div class="chart-card-title">eFG% vs Rentabilidad (PPP) · tamaño = PLAYS</div>
        <div style="position:relative;height:240px;"><canvas id="c2" role="img" aria-label="eFG vs PPP scatter"></canvas></div>
      </div>
      <div class="chart-card" style="margin-bottom:0;">
        <div class="chart-card-title">Volumen (PLAYS) vs VAL</div>
        <div style="position:relative;height:240px;"><canvas id="c3" role="img" aria-label="PLAYS vs VAL"></canvas></div>
      </div>
    </div>
  </div>

  <div style="margin-bottom:24px;">
    <div class="sum-title">Perfiles individuales · Fase regular</div>
    <div class="profile-grid">
      ${P.map((p,i)=>`
      <div class="pf-card">
        <div class="pf-header">
          <div class="pf-avatar" style="background:${p.ab};color:${p.ac};">${p.init}</div>
          <div>
            <div class="pf-name">${p.full}</div>
            <div class="pf-sub">
              <span>${p.pj} PJ · ${p.min.toFixed(1)} MIN</span>
              <span class="${p.pb.includes('ÉLITE')?'badge-e':p.pb.includes('MÍNIMO')?'badge-l':'badge-p'}">${p.pb}</span>
            </div>
          </div>
        </div>
        <div class="pf-stats">
          <div class="pf-stat"><div class="pf-stat-val">${p.pts.toFixed(1)}</div><div class="pf-stat-lbl">PTS</div></div>
          <div class="pf-stat"><div class="pf-stat-val">${p.efg.toFixed(1)}%</div><div class="pf-stat-lbl">eFG%</div></div>
          <div class="pf-stat"><div class="pf-stat-val">${p.ppp.toFixed(2)}</div><div class="pf-stat-lbl">PPP</div></div>
          <div class="pf-stat"><div class="pf-stat-val">${p.plays.toFixed(1)}</div><div class="pf-stat-lbl">PLAYS</div></div>
          <div class="pf-stat"><div class="pf-stat-val">${p.rd.toFixed(1)}</div><div class="pf-stat-lbl">RD</div></div>
          <div class="pf-stat"><div class="pf-stat-val">${p.ro.toFixed(1)}</div><div class="pf-stat-lbl">RO</div></div>
        </div>
        <div class="pf-hl">
          ${p.phl.map(h=>`<div class="pf-hl-item"><span class="pf-hl-lbl">${h.l}</span><span class="pf-hl-val">${h.v}</span></div>`).join('')}
        </div>
        <div class="pf-desc">${p.pd}</div>
      </div>`).join('')}
    </div>
  </div>

  <div>
    <div class="sum-title">Veredictos de renovación · Plantel completo</div>
    ${P.map(p=>`
    <div class="vl-row">
      <div class="vl-dot" style="background:${p.rc};margin-top:4px;"></div>
      <div style="flex:1;">
        <div class="vl-name">${p.full} <span class="renov-badge ${rcls(p.ren)}">${p.rl}</span></div>
        <div class="vl-reason">${p.rr}</div>
      </div>
    </div>`).join('')}
    <div class="exec-box">
      <div class="exec-title">Resumen ejecutivo</div>
      <div class="exec-text">Núcleo irrenunciable: <strong>Stehli + Ibarra + Grytsak + Marini</strong> (los cuatro pilares del sistema). <strong>Roca</strong> merece ascender al cinco inicial o a rotación de 24+ min en playoffs. <strong>Roveres</strong> aporta con rol definido. <strong>Tarnowyk y Conti</strong> requieren evaluación honesta antes de renovar. <strong>Fornes</strong>, prioridad baja.</div>
    </div>
  </div>`;

  // PTS Chart
  const c1=document.getElementById('c1');
  if(c1){
    const ch=new Chart(c1,{type:'bar',data:{labels:names,datasets:[
      {label:'PTS',data:P.map(p=>p.pts),backgroundColor:COLORS.map(c=>c+'44'),borderColor:COLORS,borderWidth:1.5,borderRadius:4},
      {type:'line',label:'MIN/4',data:P.map(p=>+(p.min/4).toFixed(2)),borderColor:'rgba(255,255,255,0.18)',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,4],pointRadius:3,pointBackgroundColor:'rgba(255,255,255,0.25)',tension:0.3}
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e2230',titleColor:'#9a9890',bodyColor:'#f0eee8',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
        callbacks:{label:c=>c.datasetIndex===1?'MIN: '+(c.raw*4).toFixed(1):'PTS: '+c.raw}}},
      scales:{x:{ticks:{color:'#5a5856',font:{size:11,family:"'DM Mono',monospace"}},grid:{display:false}},
        y:{min:0,max:16,ticks:{color:'#5a5856',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'}}}
    }});
    charts.push(ch);
  }

  // Scatter
  const c2=document.getElementById('c2');
  if(c2){
    const ch=new Chart(c2,{type:'scatter',data:{datasets:P.map((p,i)=>({
      label:p.name,data:[{x:p.efg,y:p.ppp}],
      backgroundColor:COLORS[i]+'cc',pointRadius:Math.max(7,p.plays*0.6),borderColor:COLORS[i],borderWidth:1.5
    }))},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e2230',titleColor:'#9a9890',bodyColor:'#f0eee8',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
        callbacks:{label:c=>`${c.dataset.label}: eFG% ${c.parsed.x.toFixed(1)}% | PPP ${c.parsed.y.toFixed(2)}`}}},
      scales:{
        x:{title:{display:true,text:'eFG%',color:'#5a5856',font:{size:9}},min:40,max:65,ticks:{color:'#5a5856',font:{size:9},callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.05)'}},
        y:{title:{display:true,text:'PPP',color:'#5a5856',font:{size:9}},min:0.70,max:1.20,ticks:{color:'#5a5856',font:{size:9}},grid:{color:'rgba(255,255,255,0.05)'}}
      }
    }});
    charts.push(ch);
  }

  // PLAYS vs VAL
  const c3=document.getElementById('c3');
  if(c3){
    const ch=new Chart(c3,{type:'bar',data:{labels:names,datasets:[
      {label:'VAL',data:P.map(p=>p.val),backgroundColor:COLORS.map(c=>c+'77'),borderColor:COLORS,borderWidth:1.5,borderRadius:4},
      {label:'PLAYS',data:P.map(p=>p.plays),backgroundColor:COLORS.map(c=>c+'22'),borderColor:COLORS.map(c=>c+'55'),borderWidth:1,borderRadius:4}
    ]},options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1e2230',titleColor:'#9a9890',bodyColor:'#f0eee8',borderColor:'rgba(255,255,255,0.1)',borderWidth:1}},
      scales:{x:{ticks:{color:'#5a5856',font:{size:11}},grid:{display:false}},
        y:{min:0,max:18,ticks:{color:'#5a5856',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'}}}
    }});
    charts.push(ch);
  }
}

render();
</script>
</body>
</html>
